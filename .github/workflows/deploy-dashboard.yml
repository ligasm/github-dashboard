name: Deploy PR Dashboard

on:
  push:
    branches: [main]
    paths: ['pr-dashboard/**']

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pr-dashboard/package-lock.json
      - run: npm ci
        working-directory: pr-dashboard
      - run: npm run build
        working-directory: pr-dashboard
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: pr-dashboard/dist
